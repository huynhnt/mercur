name: Build and Deploy Frontends

on:
  push:
    branches:
      - main # Hoặc tên branch chính của bạn (ví dụ: canary, master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8 # Khớp với phiên bản trong package.json

      - name: Install Dependencies
        run: bun install

      - name: Build Project
        env:
          VITE_MERCUR_BACKEND_URL: http://api.huylio.com
          VITE_MERCUR_VENDOR_URL: http://vendor.huylio.com
        run: bun run build

      # Deploy Admin Dashboard
      - name: Deploy Admin to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          #key: ${{ secrets.SSH_KEY }} # Private key SSH (khuyên dùng) hoặc dùng SSH_PASSWORD
          password: ${{ secrets.SSH_PASSWORD }} 
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "apps/admin-test/dist/**"
          target: "/www/wwwroot/mercur/"
          strip_components: 0 # Giữ nguyên cấu trúc thư mục apps/admin-test/dist

      # Deploy Vendor Dashboard
      - name: Deploy Vendor to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          #key: ${{ secrets.SSH_KEY }} # Private key SSH (khuyên dùng) hoặc dùng SSH_PASSWORD
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "apps/vendor/dist/**"
          target: "/www/wwwroot/mercur/"
          strip_components: 0 # Giữ nguyên cấu trúc thư mục apps/vendor/dist
